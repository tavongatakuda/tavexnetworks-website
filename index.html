<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarvex Networks</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#f8fbff;
    }

    h1{
      text-align:center;
      color:#0b2a5b;
      margin-top:20px;
    }

    .hero-img{
      width:100%;
      border-radius:20px;
      margin-top:20px;
    }

    .container{
      width:90%;
      margin:auto;
    }

    .preview{
      height:300px;
      background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)),
        url("hero.jpg") center/cover no-repeat;
      border-radius:20px;
      display:flex;
      align-items:flex-end;
      color:white;
      padding:20px;
      margin-top:20px;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Welcome to Tarvex Networks</h1>

  <!-- HERO IMAGE -->
  <img src="hero.jpg" class="hero-img" alt="Tarvex Hero">

  <!-- HERO PREVIEW BOX -->
  <div class="preview">
    <div>
      <h2>Tarvex is coming soon</h2>
      <p>Websites • Domains • AI • Hosting</p>
    </div>
  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarvex Networks</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#062b22,#031914);
color:white;
overflow-x:hidden;
}

/* NAV */

.nav{
display:flex;
justify-content:space-between;
padding:20px;
align-items:center;
}

.right{
display:flex;
gap:10px;
}

.login{
background:white;
color:black;
padding:8px 16px;
border-radius:20px;
text-decoration:none;
}

.signup{
border:1px solid white;
color:white;
padding:8px 16px;
border-radius:20px;
text-decoration:none;
}

/* HERO */

.hero{
padding:60px 20px;
text-align:center;
}

.hero h1{
font-size:34px;
margin-bottom:10px;
}

.hero p{
opacity:.8;
}

/* INPUT */

.box{
max-width:500px;
margin:auto;
margin-top:20px;
}

textarea{
width:100%;
height:120px;
padding:15px;
border-radius:16px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:16px;
margin-top:10px;
border:none;
border-radius:16px;
background:black;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="nav">
<div>Tarvex</div>

<div class="right">
<a class="signup" href="dashboard.html">Dashboard</a>
<a class="login" href="builder.html">Login</a>
</div>

</div>

<div class="hero">

<h1>Build your website with AI</h1>

<p>Describe your idea and Tarvex builds it instantly</p>

<div class="box">

<textarea placeholder="example: restaurant website with menu"></textarea>

<button onclick="start()">Start Building</button>

</div>

</div>

<script>
function start(){
window.location.href="builder.html"
}
</script>

</body>
</html>

<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Tarvex</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:
radial-gradient(circle at 20% 20%, #00ffae22 0%, transparent 40%),
radial-gradient(circle at 80% 70%, #00ffae22 0%, transparent 40%),
linear-gradient(180deg,#031914,#02110d);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,255,174,0.2);
backdrop-filter:blur(20px);
border-radius:20px;
padding:25px;
}

h1{
margin-bottom:20px;
}

.box{
background:rgba(0,255,174,0.08);
padding:15px;
border-radius:14px;
margin-bottom:15px;
}

.label{
opacity:.7;
font-size:14px;
}

.value{
font-size:18px;
margin-top:4px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

.green{
background:linear-gradient(90deg,#00ffae,#00c896);
color:black;
}

.red{
background:#ff4d4d;
color:white;
}

</style></head><body><div class="card"><h1>Your Profile</h1><div class="box">
<div class="label">Name</div>
<div id="name" class="value">User</div>
</div><div class="box">
<div class="label">Email</div>
<div id="email" class="value">Not set</div>
</div><div class="box">
<div class="label">Purchased Domain</div>
<div id="domain" class="value">None</div>
</div><button class="btn green" onclick="goDash()">Dashboard</button>
<button class="btn red" onclick="logout()">Logout</button>

</div><script>

/* GET USER */

let user = JSON.parse(localStorage.getItem("user"))

if(user){
if(user.name){
document.getElementById("name").innerText = user.name
}
if(user.email){
document.getElementById("email").innerText = user.email
}
}

/* GET DOMAIN */

let domain = localStorage.getItem("purchased_domain")

if(domain){
document.getElementById("domain").innerText = domain
}

/* NAV */

function goDash(){
window.location.href="dashboard.html"
}

function logout(){
localStorage.removeItem("user")
window.location.href="login.html"
}

</script></body>
  </html>

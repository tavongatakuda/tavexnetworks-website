<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Tarvex Networks</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f8fbff;
}

.container{
  width:90%;
  margin:auto;
}

.nav{
  background:white;
  padding:15px;
  border-bottom:1px solid #ddd;
}

.nav a{
  margin-right:15px;
  text-decoration:none;
  color:#333;
  font-weight:600;
}

.nav a:hover{
  color:#1d4ed8;
}

h1{
  text-align:center;
  color:#0b2a5b;
}

.card{
  background:white;
  padding:20px;
  border-radius:20px;
  margin-top:30px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  margin-top:15px;
  padding:12px;
  width:100%;
  background:#1d4ed8;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.contact-info{
  margin-top:20px;
  text-align:center;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="packages.html">Packages</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</div>

<div class="container">

  <h1>Contact Us</h1>

  <div class="card">
    <h2>Send us a message</h2>

    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea rows="5" placeholder="Your Message"></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>

  <div class="contact-info">
    <p>Email: tarvexnetworks@gmail.com</p>
    <p>Location: Zimbabwe</p>
  </div>

</div>

</body>
</html>

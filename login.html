<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Tarvex</title>

<style>
body{
font-family:Arial;
background:linear-gradient(180deg,#062b22,#031914);
color:white;
}

.container{
max-width:400px;
margin:auto;
padding:20px;
margin-top:60px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:20px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:black;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Login</h2>

<div class="card">

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>No account? <a href="signup.html">Sign up</a></p>

</div>

</div>

<script>

function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

let user=JSON.parse(localStorage.getItem("user"))

if(!user){
alert("Create account first")
return
}

if(user.email==email && user.password==password){

localStorage.setItem("loggedIn","true")

window.location.href="builder.html"

}else{
alert("Wrong login")
}

}

</script>

</body>
</html>

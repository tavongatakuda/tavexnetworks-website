<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Tarvex</title><style>

body{
font-family:Segoe UI;
background:#f5f7ff;
margin:0;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-top:40px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
margin-top:15px;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
width:100%;
}

</style></head><body><div class="container"><h2>Login</h2><div class="card"><input id="email" placeholder="Email"><input id="password" type="password" placeholder="Password"><button onclick="login()">Login</button>

<p>No account? <a href="signup.html">Create account</a></p></div></div><script>

function login(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

let user = JSON.parse(localStorage.getItem("user"));

if(!user){
alert("Create account first");
return;
}

if(user.email === email && user.password === password){

localStorage.setItem("loggedIn", true);

window.location.href="dashboard.html";

}else{

alert("Wrong login details");

}

}

</script></body>
</html>

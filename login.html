<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarvex Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:linear-gradient(180deg,#062b22,#031914);
color:white;
overflow-x:hidden;
}

.nav{
display:flex;
justify-content:space-between;
padding:15px;
}

.menu-btn{
font-size:24px;
cursor:pointer;
}

.menu{
display:none;
position:absolute;
right:10px;
top:60px;
background:white;
color:black;
padding:15px;
border-radius:10px;
}

.menu a{
display:block;
padding:8px;
text-decoration:none;
color:black;
}

.container{
max-width:400px;
margin:auto;
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:20px;
margin-top:20px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
}

.black{
background:black;
color:white;
}

.social{
background:#eee;
display:flex;
align-items:center;
gap:10px;
}

</style>
</head>

<body>

<div class="nav">
<div>Tarvex</div>

<div class="menu-btn" onclick="toggle()">☰</div>

<div class="menu" id="menu">
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
</div>

</div>

<div class="container">

<h2>Start building your website</h2>

<div class="card">

<input id="email" placeholder="Email address">

<button class="black" onclick="login()">
Continue with email
</button>

<button class="social" onclick="social()">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" width="20">
Continue with Google
</button>

<button class="social" onclick="social()">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/apple/apple-original.svg" width="20">
Continue with Apple
</button>

<button class="social" onclick="social()">
<img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" width="20">
Continue with Facebook
</button>

</div>

</div>

<script>

function toggle(){
let m=document.getElementById("menu")
m.style.display = m.style.display=="block"?"none":"block"
}

function login(){
let email=document.getElementById("email").value

if(email==""){
alert("Enter email")
return
}

localStorage.setItem("user",email)

window.location.href="dashboard.html"
}

function social(){
localStorage.setItem("user","social_user")
window.location.href="dashboard.html"
}

</script>

</body>
  </html>

<!DOCTYPE html>
<html>
<head>
<title>Login - Tarvex</title>

<style>
body{
font-family:Arial;
background:#f8fbff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:20px;
width:300px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#1d4ed8;
color:white;
border:none;
border-radius:10px;
font-size:16px;
}
</style>
</head>

<body>

<div class="box">
<h2>Login to Tarvex</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>
function login(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

if(user === "admin" && pass === "1234"){
window.location.href = "dashboard.html";
}else{
alert("Wrong login details");
}

}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domains - Tarvex</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background: radial-gradient(circle at center,#0a3d2f 0%, #031914 60%);
color:white;
}

/* LAYOUT */

.app{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#02110d;
padding:20px;
border-right:1px solid rgba(255,255,255,0.05);
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:25px;
}

.menu a{
display:block;
color:white;
text-decoration:none;
padding:12px;
border-radius:10px;
margin-bottom:6px;
transition:.2s;
}

.menu a:hover{
background:#062b22;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* GLASS CARD */

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,255,174,0.15);
color:white;
padding:20px;
border-radius:12px;
margin-top:20px;
backdrop-filter:blur(10px);
}

/* INPUT */

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid rgba(0,255,174,0.2);
background:rgba(255,255,255,0.05);
color:white;
outline:none;
}

input::placeholder{
color:rgba(255,255,255,0.4);
}

/* BUTTON */

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00ffae,#00c896);
color:black;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 20px rgba(0,255,174,0.4);
}

/* DOMAIN ROW */

.domain{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,0.08);
align-items:center;
}

/* BUY BUTTON */

.buy{
background:#00ffae;
color:black;
padding:6px 12px;
border-radius:6px;
font-size:14px;
cursor:pointer;
}

.buy:hover{
background:#00c896;
}

/* MOBILE */

@media(max-width:800px){

.app{
flex-direction:column;
}

.sidebar{
width:100%;
}

}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">Tarvex</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="builder.html">AI Builder</a>
<a href="domains.html">Domains</a>
<a href="deploy.html">Deploy</a>
<a href="ai.html">AI Assistant</a>
</div>

</div>

<!-- MAIN -->

<div class="main">

<h1>Domain Search</h1>
<p>Find the perfect domain name</p>

<div class="card">

<input id="domain" placeholder="example: mybusiness">

<button onclick="search()">Search Domain</button>

</div>

<div class="card" id="results" style="display:none"></div>

</div>

</div>

<script>

function search(){

let name = document.getElementById("domain").value

if(name==""){
alert("Enter domain name")
return
}

document.getElementById("results").style.display="block"

document.getElementById("results").innerHTML = `

<h3>Available Domains</h3>

<div class="domain">
<span>${name}.com</span>
<div class="buy">$10 Buy</div>
</div>

<div class="domain">
<span>${name}.net</span>
<div class="buy">$8 Buy</div>
</div>

<div class="domain">
<span>${name}.org</span>
<div class="buy">$7 Buy</div>
</div>

<div class="domain">
<span>${name}.online</span>
<div class="buy">$3 Buy</div>
</div>

<div class="domain">
<span>${name}.store</span>
<div class="buy">$5 Buy</div>
</div>

`

}

</script>

</body>
  </html>

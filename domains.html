<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domains - Tarvex</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#031914;
color:white;
}

/* LAYOUT */

.app{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#02110d;
padding:20px;
}

.logo{
font-size:20px;
margin-bottom:30px;
}

.menu a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin-bottom:5px;
border-radius:8px;
}

.menu a:hover{
background:#062b22;
}

/* MAIN */

.main{
flex:1;
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:12px;
margin-top:20px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:black;
color:white;
cursor:pointer;
}

.result{
display:none;
}

.domain{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.buy{
background:#2563eb;
color:white;
padding:5px 10px;
border-radius:6px;
}

@media(max-width:800px){
.sidebar{
display:none;
}
}

</style>

</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">Tarvex</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="builder.html">AI Builder</a>
<a href="domains.html">Domains</a>
<a href="deploy.html">Deploy</a>
<a href="ai.html">AI Assistant</a>
</div>

</div>

<div class="main">

<h2>Domain Search</h2>
<p>Find your perfect domain</p>

<div class="card">

<input id="domain" placeholder="example: tarvex">

<button onclick="search()">Search</button>

</div>

<div class="card result" id="result">

<div class="domain">
<span id="d1"></span>
<span class="buy">Buy</span>
</div>

<div class="domain">
<span id="d2"></span>
<span class="buy">Buy</span>
</div>

<div class="domain">
<span id="d3"></span>
<span class="buy">Buy</span>
</div>

</div>

</div>

</div>

<script>

function search(){

let name=document.getElementById("domain").value

if(name==""){
alert("Enter domain name")
return
}

document.getElementById("result").style.display="block"

document.getElementById("d1").innerText=name+".com"
document.getElementById("d2").innerText=name+".net"
document.getElementById("d3").innerText=name+".live"

}

</script>

</body>
</html>

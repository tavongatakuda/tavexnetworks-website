<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarvex Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#031914;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
padding:15px 20px;
background:#02110d;
}

.app{
display:flex;
min-height:100vh;
}

.sidebar{
width:220px;
background:#02110d;
padding:20px;
}

.logo{
font-size:20px;
margin-bottom:30px;
}

.menu a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin-bottom:5px;
border-radius:8px;
}

.menu a:hover{
background:#062b22;
}

.main{
flex:1;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:12px;
text-decoration:none;
display:block;
}

</style>
</head>

<body>

<div class="topbar">

<div>Tarvex Dashboard</div>

<div>
<a href="index.html">Home</a>
<button onclick="logout()">Logout</button>
</div>

</div>

<div class="app">

<div class="sidebar">

<div class="logo">Tarvex</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="builder.html">AI Builder</a>
<a href="domains.html">Domains</a>
<a href="deploy.html">Deploy</a>
<a href="ai.html">AI Assistant</a>
</div>

</div>

<div class="main">

<h1>Dashboard</h1>
<p>Welcome to Tarvex platform</p>

<div class="grid">

<a class="card" href="builder.html">
<h3>AI Website Builder</h3>
</a>

<a class="card" href="domains.html">
<h3>Domains</h3>
</a>

<a class="card" href="deploy.html">
<h3>Deploy</h3>
</a>

<a class="card" href="ai.html">
<h3>AI Assistant</h3>
</a>

</div>

</div>

</div>

<script>

let logged = localStorage.getItem("loggedIn")

if(!logged){
window.location.href="login.html"
}

function logout(){
localStorage.removeItem("loggedIn")
window.location.href="login.html"
}

</script>

</body>
</html>

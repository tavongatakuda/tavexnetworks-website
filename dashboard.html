<!DOCTYPE html>
<html>
<head>
<title>Tarvex Dashboard</title>

<style>
body{
font-family:Arial, sans-serif;
margin:0;
background:#eef2ff;
}

.nav{
background:#0b2a5b;
color:white;
padding:18px;
font-size:22px;
display:flex;
justify-content:space-between;
align-items:center;
}

.nav a{
color:white;
text-decoration:none;
margin-left:15px;
font-size:16px;
}

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
cursor:pointer;
text-decoration:none;
color:black;
display:block;
}

.card h3{
font-size:20px;
margin:0 0 8px 0;
}

.card p{
font-size:15px;
color:#555;
}

.card:hover{
transform:translateY(-4px);
}

@media(min-width:900px){
.grid{
grid-template-columns:repeat(3,1fr);
}
}
</style>

</head>

<body>

<div class="nav">
<div>Tarvex Dashboard</div>

<div>
<a href="index.html">Home</a>
<a href="login.html">Logout</a>
</div>
</div>

<div class="container">

<div class="grid">

<a href="builder.html" class="card">
<h3>Website Builder</h3>
<p>Create and manage websites</p>
</a>

<a href="domains.html" class="card">
<h3>Domains & Hosting</h3>
<p>Search and buy domains</p>
</a>

<a href="ai.html" class="card">
<h3>Housing AI</h3>
<p>Smart home assistant</p>
</a>

<a href="api.html" class="card">
<h3>APIs</h3>
<p>Integration services</p>
</a>

<a href="dns.html" class="card">
<h3>DNS Manager</h3>
<p>Manage DNS records</p>
</a>

<a href="deploy.html" class="card">
<h3>Deployment Engine</h3>
<p>One-click deployment</p>
</a>

</div>

</div>

</body>
</html>

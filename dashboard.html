<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarvex Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#062b22,#031914);
color:white;
overflow-x:hidden;
}

/* NAV */

.nav{
display:flex;
justify-content:space-between;
padding:20px;
}

.logout{
background:white;
color:black;
padding:8px 14px;
border-radius:20px;
text-decoration:none;
}

/* CONTENT */

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:16px;
text-decoration:none;
}

.card h3{
margin-bottom:5px;
}

@media(max-width:700px){
.grid{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="nav">
<div>Dashboard</div>
<a class="logout" href="index.html">Home</a>
</div>

<div class="container">

<h2>Welcome to Tarvex</h2>
<p>Choose what you want to build</p>

<div class="grid">

<a class="card" href="builder.html">
<h3>AI Website Builder</h3>
<p>Create full websites instantly</p>
</a>

<a class="card" href="domains.html">
<h3>Domains & Hosting</h3>
<p>Search and buy domains</p>
</a>

<a class="card" href="ai.html">
<h3>Tarvex AI</h3>
<p>Ask AI anything</p>
</a>

<a class="card" href="deploy.html">
<h3>Deploy Website</h3>
<p>Publish your project</p>
</a>

</div>

</div>

</body>
</html>

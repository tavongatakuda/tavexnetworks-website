<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarvex Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#062b22,#031914);
color:white;
overflow-x:hidden;
}

/* NAV */

.nav{
display:flex;
justify-content:space-between;
padding:15px;
}

.logo{
font-weight:700;
}

/* GRID */

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:16px;
text-decoration:none;
}

.card h3{
margin-bottom:5px;
}

@media(max-width:700px){
.grid{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="nav">
<div class="logo">Tarvex Dashboard</div>
</div>

<div class="container">

<h2>Build with Tarvex</h2>

<div class="grid">

<a class="card" href="builder.html">
<h3>Website Builder</h3>
<p>Create AI websites</p>
</a>

<a class="card" href="domains.html">
<h3>Domains & Hosting</h3>
<p>Buy domains</p>
</a>

<a class="card" href="ai.html">
<h3>Housing AI</h3>
<p>Smart assistant</p>
</a>

<a class="card" href="api.html">
<h3>APIs</h3>
<p>Developer tools</p>
</a>

<a class="card" href="dns.html">
<h3>DNS Manager</h3>
<p>Manage DNS</p>
</a>

<a class="card" href="deploy.html">
<h3>Deployment</h3>
<p>Deploy websites</p>
</a>

</div>

</div>

</body>
</html>

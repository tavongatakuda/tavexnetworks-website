<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Tarvex</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f1f5ff;
}

.nav{
background:#0b2a5b;
color:white;
padding:15px;
font-size:18px;
}

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

@media(max-width:800px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="nav">
Tarvex Dashboard
</div>

<div class="container">

<div class="grid">

<div class="card">
<h3>Website Builder</h3>
<p>Create and manage websites</p>
</div>

<div class="card">
<h3>Domains</h3>
<p>Search and buy domains</p>
</div>

<div class="card">
<h3>AI Tools</h3>
<p>Smart features coming soon</p>
</div>

<div class="card">
<h3>Hosting</h3>
<p>Manage hosting plans</p>
</div>

<div class="card">
<h3>DNS Manager</h3>
<p>Control DNS records</p>
</div>

<div class="card">
<h3>Deployment</h3>
<p>Launch websites instantly</p>
</div>

</div>

</div>

</body>
  </html>

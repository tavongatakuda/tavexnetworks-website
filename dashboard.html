<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarvex Dashboard</title><style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f7ff;
}

/* NAV */

.nav{
background:#0b2a5b;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
}

.logout{
background:white;
color:#0b2a5b;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

/* CONTENT */

.container{
padding:20px;
}

.welcome{
background:white;
padding:20px;
border-radius:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.card{
background:white;
padding:18px;
border-radius:12px;
text-decoration:none;
color:#0b2a5b;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card:hover{
transform:translateY(-3px);
}

</style></head><body><script>

let loggedIn = localStorage.getItem("loggedIn");

if(!loggedIn){
window.location.href = "login.html";
}

let user = JSON.parse(localStorage.getItem("user"));

</script><div class="nav"><div>Tarvex Dashboard</div><div onclick="logout()" class="logout">
Logout
</div></div><div class="container"><div class="welcome"><h2>Welcome, <span id="username"></span></h2><p>Credits left: <strong id="credits"></strong></p></div><div class="grid"><a href="builder.html" class="card">
<h3>Website Builder</h3>
<p>Create AI websites</p>
</a><a href="domains.html" class="card">
<h3>Domains & Hosting</h3>
<p>Buy domains</p>
</a><a href="ai.html" class="card">
<h3>Housing AI</h3>
<p>Smart assistant</p>
</a><a href="api.html" class="card">
<h3>APIs</h3>
<p>Platform tools</p>
</a><a href="dns.html" class="card">
<h3>DNS Manager</h3>
<p>Manage DNS</p>
</a><a href="deploy.html" class="card">
<h3>Deployment</h3>
<p>Deploy website</p>
</a></div></div><script>

document.getElementById("username").innerText = user.name;
document.getElementById("credits").innerText = user.credits;

function logout(){

localStorage.removeItem("loggedIn");

window.location.href = "login.html";

}

</script></body>
</html>

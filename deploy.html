<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deploy - Tarvex</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#062b22,#031914);
color:white;
overflow-x:hidden;
}

.nav{
display:flex;
justify-content:space-between;
padding:20px;
}

.back{
background:white;
color:black;
padding:8px 14px;
border-radius:20px;
text-decoration:none;
}

.container{
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:16px;
margin-top:20px;
}

input{
width:100%;
padding:15px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:12px;
background:black;
color:white;
font-size:16px;
cursor:pointer;
}

.success{
display:none;
margin-top:20px;
}

.link{
background:#f3f3f3;
padding:10px;
border-radius:8px;
margin-top:10px;
font-family:monospace;
}

</style>

</head>

<body>

<div class="nav">
<div>Deploy</div>
<a class="back" href="dashboard.html">Dashboard</a>
</div>

<div class="container">

<h2>Deploy your website</h2>
<p>Publish your AI generated website</p>

<div class="card">

<input id="name" placeholder="example: mybusiness">

<button onclick="deploy()">Deploy Website</button>

</div>

<div class="card success" id="success">

<h3>Website deployed</h3>

<p>Your website is live at:</p>

<div class="link" id="link"></div>

</div>

</div>

<script>

function deploy(){

let name=document.getElementById("name").value

if(name==""){
alert("Enter website name")
return
}

document.getElementById("success").style.display="block"

document.getElementById("link").innerText=
"https://tarvex.site/"+name

}

</script>

</body>
</html>

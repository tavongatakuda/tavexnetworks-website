<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deploy - Tarvex</title>

<style>

body{
font-family:Arial;
background:#031914;
color:white;
text-align:center;
padding:40px;
}

.card{
background:white;
color:black;
padding:30px;
border-radius:12px;
max-width:500px;
margin:auto;
}

button{
padding:15px;
border:none;
background:black;
color:white;
border-radius:10px;
margin-top:15px;
width:100%;
}

</style>

</head>

<body>

<h1>Deploy Website</h1>

<div class="card">

<p>Your website is ready to deploy</p>

<button onclick="publish()">Publish Website</button>

<div id="status"></div>

</div>

<script>

function publish(){

document.getElementById("status").innerHTML="Deploying..."

setTimeout(()=>{

document.getElementById("status").innerHTML=`
<h3>Website Published</h3>
<p>Your site is live</p>
<p>tarvex.site/your-site</p>
`

},1500)

}

</script>

</body>
</html>

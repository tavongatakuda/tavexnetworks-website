<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deploy - Tarvex</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#031914;
color:white;
}

/* LAYOUT */

.app{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#02110d;
padding:20px;
}

.logo{
font-size:20px;
margin-bottom:30px;
}

.menu a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin-bottom:5px;
border-radius:8px;
}

.menu a:hover{
background:#062b22;
}

/* MAIN */

.main{
flex:1;
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:12px;
margin-top:20px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:black;
color:white;
cursor:pointer;
}

.success{
display:none;
margin-top:20px;
}

.link{
background:#f3f3f3;
padding:10px;
border-radius:8px;
margin-top:10px;
font-family:monospace;
}

@media(max-width:800px){
.sidebar{
display:none;
}
}

</style>

</head>

<body>

<div class="app">

<div class="sidebar">

<div class="logo">Tarvex</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="builder.html">AI Builder</a>
<a href="domains.html">Domains</a>
<a href="deploy.html">Deploy</a>
<a href="ai.html">AI Assistant</a>
</div>

</div>

<div class="main">

<h2>Deploy Website</h2>
<p>Publish your generated site</p>

<div class="card">

<input id="name" placeholder="example: mywebsite">

<button onclick="deploy()">Deploy Website</button>

</div>

<div class="card success" id="success">

<h3>Website deployed</h3>

<p>Your site is live:</p>

<div class="link" id="link"></div>

</div>

</div>

</div>

<script>

function deploy(){

let name=document.getElementById("name").value

if(name==""){
alert("Enter website name")
return
}

document.getElementById("success").style.display="block"

document.getElementById("link").innerText =
"https://tarvex.site/"+name

}

</script>

</body>
</html>

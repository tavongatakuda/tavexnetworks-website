<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deploy - Tarvex</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#062b22,#031914);
color:white;
overflow-x:hidden;
}

.nav{
padding:15px;
font-weight:700;
}

.container{
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:16px;
margin-top:15px;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:black;
color:white;
font-size:16px;
cursor:pointer;
}

.success{
display:none;
margin-top:15px;
}

.link{
background:#f3f3f3;
padding:10px;
border-radius:8px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="nav">
Deploy Website
</div>

<div class="container">

<h2>Publish your website</h2>

<div class="card">

<input id="sitename" placeholder="example: mywebsite">

<button onclick="deploy()">Deploy</button>

</div>

<div class="card success" id="success">

<h3>Website deployed successfully</h3>

<div class="link" id="link"></div>

</div>

</div>

<script>

function deploy(){

let name=document.getElementById("sitename").value

if(name==""){
alert("Enter website name")
return
}

document.getElementById("success").style.display="block"

document.getElementById("link").innerText=
"https://tarvex.site/"+name

}

</script>

</body>
</html>

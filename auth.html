<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start building - Tarvex</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#062b22,#031914);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.wrapper{
width:100%;
max-width:420px;
padding:20px;
}

h1{
font-size:28px;
margin-bottom:10px;
}

p{
opacity:.8;
margin-bottom:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:18px;
}

input{
width:100%;
padding:16px;
border-radius:12px;
border:1px solid #ddd;
margin-bottom:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
font-size:16px;
}

.email{
background:black;
color:white;
}

.social{
background:#f3f3f3;
}

.small{
text-align:center;
font-size:14px;
margin-top:5px;
}
</style>

</head>

<body>

<div class="wrapper">

<h1>Start building your website</h1>
<p>Create your account or login</p>

<div class="card">

<input id="email" placeholder="Email address">
<input id="password" type="password" placeholder="Password">

<button class="email" onclick="auth()">Continue</button>

<button class="social" onclick="social()">Continue with Google</button>
<button class="social" onclick="social()">Continue with Apple</button>
<button class="social" onclick="social()">Continue with Facebook</button>

<div class="small">
Enter email + password to sign up or login
</div>

</div>

</div>

<script>

function auth(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

if(email=="" || pass==""){
alert("Enter email and password")
return
}

let user=JSON.parse(localStorage.getItem("user"))

if(!user){
localStorage.setItem("user",JSON.stringify({email:email,password:pass}))
window.location.href="dashboard.html"
return
}

if(user.email==email && user.password==pass){
window.location.href="dashboard.html"
}else{
alert("Wrong login")
}

}

function social(){
window.location.href="dashboard.html"
}

</script>

</body>
</html>

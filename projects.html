<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarvex Projects</title>

<style>

body{
font-family:Arial;
background:linear-gradient(180deg,#031914,#02110d);
color:white;
padding:20px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,255,174,0.2);
padding:20px;
border-radius:14px;
margin-bottom:12px;
cursor:pointer;
transition:.2s;
position:relative;
}

.card:hover{
background:rgba(0,255,174,0.08);
transform:translateY(-2px);
}

.title{
font-size:18px;
color:#00ffae;
}

.prompt{
opacity:.8;
margin-top:4px;
}

.date{
opacity:.5;
font-size:12px;
margin-top:6px;
}

/* ACTIONS */

.actions{
position:absolute;
right:15px;
top:15px;
display:flex;
gap:8px;
}

.btn{
background:rgba(0,255,174,0.15);
border:none;
color:white;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.btn:hover{
background:#00ffae;
color:black;
}

/* EMPTY */

.empty{
text-align:center;
opacity:.4;
margin-top:60px;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
<h2>Your Projects</h2>
</div>

<div id="projects"></div>

<script>

let projects = JSON.parse(localStorage.getItem("projects")) || []

render()

function render(){

if(projects.length === 0){
document.getElementById("projects").innerHTML =
"<div class='empty'>No projects yet</div>"
return
}

let html=""

projects.slice().reverse().forEach((p,i)=>{

let index = projects.length - 1 - i

html += `
<div class="card" onclick="openProject(${index})">

<div class="actions">
<button class="btn" onclick="event.stopPropagation();renameProject(${index})">Rename</button>
<button class="btn" onclick="event.stopPropagation();deleteProject(${index})">Delete</button>
</div>

<div class="title">${p.name}</div>
<div class="prompt">${p.prompt}</div>
<div class="date">${p.date}</div>

</div>
`
})

document.getElementById("projects").innerHTML = html

}

/* OPEN PROJECT */

function openProject(index){

let project = projects[index]

localStorage.setItem("open_project", project.prompt)

window.location.href = "builder.html"

}

/* DELETE */

function deleteProject(index){

if(!confirm("Delete project?")) return

projects.splice(index,1)

localStorage.setItem("projects", JSON.stringify(projects))

render()

}

/* RENAME */

function renameProject(index){

let newName = prompt("New project name")

if(!newName) return

projects[index].name = newName

localStorage.setItem("projects", JSON.stringify(projects))

render()

}

</script>

</body>
</html>

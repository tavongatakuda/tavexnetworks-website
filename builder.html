<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Builder - Tarvex</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#031914;
color:white;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
padding:15px 20px;
background:#02110d;
}

/* LAYOUT */

.app{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#02110d;
padding:20px;
}

.logo{
font-size:20px;
margin-bottom:30px;
}

.menu a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin-bottom:5px;
border-radius:8px;
}

.menu a:hover{
background:#062b22;
}

/* MAIN */

.main{
flex:1;
padding:20px;
}

/* CARD */

.card{
background:white;
color:black;
padding:20px;
border-radius:12px;
margin-top:20px;
}

textarea{
width:100%;
height:140px;
padding:15px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:black;
color:white;
cursor:pointer;
}

.result{
display:none;
margin-top:20px;
}

@media(max-width:800px){

.app{
flex-direction:column;
}

.sidebar{
width:100%;
}

}

</style>

</head>

<body>

<div class="topbar">
<div>AI Builder</div>
<a href="dashboard.html">Dashboard</a>
</div>

<div class="app">

<div class="sidebar">

<div class="logo">Tarvex</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="builder.html">AI Builder</a>
<a href="domains.html">Domains</a>
<a href="deploy.html">Deploy</a>
<a href="ai.html">AI Assistant</a>
</div>

</div>

<div class="main">

<h2>AI Website Builder</h2>
<p>Describe your website idea</p>

<div class="card">

<textarea id="prompt" placeholder="example: restaurant website with booking and menu"></textarea>

<button onclick="generate()">Generate Website</button>

</div>

<div class="card result" id="result"></div>

</div>

</div>

<script>

function generate(){

let text = document.getElementById("prompt").value

if(text==""){
alert("Describe website first")
return
}

document.getElementById("result").style.display="block"

document.getElementById("result").innerHTML = "Generating..."

setTimeout(()=>{

document.getElementById("result").innerHTML = `

<h3>Website Preview</h3>

<iframe style="
width:100%;
height:450px;
border:none;
border-radius:10px;
background:white;
"
srcdoc="

<html>
<body style='font-family:Arial;margin:0'>

<div style='background:#0b2a5b;color:white;padding:15px'>
<b>${text}</b>
<span style='float:right'>
Home | About | Contact
</span>
</div>

<div style='padding:20px'>

<h2>Home</h2>
<p>Welcome to your AI generated website.</p>

<h3>About</h3>
<p>This section describes your business.</p>

<h3>Contact</h3>
<p>Email: info@website.com</p>

<button style='
padding:10px;
background:#0b2a5b;
color:white;
border:none;
border-radius:6px;
margin-top:10px;
'>
Contact Us
</button>

</div>

</body>
</html>

"></iframe>

<button onclick='deploy()' style='margin-top:15px'>
Deploy Website
</button>

`

},1000)

}

function deploy(){
window.location.href="deploy.html"
}

</script>

</body>
</html>

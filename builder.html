<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Builder - Tarvex</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#062b22,#031914);
color:white;
overflow-x:hidden;
}

.nav{
padding:15px;
font-weight:700;
}

.container{
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:16px;
margin-top:15px;
}

textarea{
width:100%;
height:120px;
padding:15px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:black;
color:white;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
display:none;
}

</style>

</head>

<body>

<div class="nav">
Tarvex AI Builder
</div>

<div class="container">

<h2>Describe your website</h2>

<div class="card">

<textarea id="prompt" placeholder="example: restaurant website with menu and contact page"></textarea>

<button onclick="generate()">Start Building</button>

</div>

<div class="result" id="result">

<div class="card">

<h3>Website Generated</h3>

<p>Your AI website structure is ready.</p>

<button onclick="deploy()">Deploy Website</button>

</div>

</div>

</div>

<script>

function generate(){

let text=document.getElementById("prompt").value

if(text==""){
alert("Describe your website first")
return
}

document.getElementById("result").style.display="block"

}

function deploy(){
window.location.href="deploy.html"
}

</script>

</body>
</html>

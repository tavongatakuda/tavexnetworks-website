<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Builder - Tarvex</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#031914;
color:white;
overflow-x:hidden;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
padding:15px 20px;
background:#02110d;
align-items:center;
}

.topbar a{
color:white;
text-decoration:none;
background:#062b22;
padding:8px 14px;
border-radius:8px;
}

/* LAYOUT */

.app{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#02110d;
padding:20px;
}

.logo{
font-size:22px;
margin-bottom:30px;
font-weight:bold;
}

.menu a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin-bottom:6px;
border-radius:8px;
}

.menu a:hover{
background:#062b22;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

.main h2{
margin-bottom:10px;
}

/* CARD */

.card{
background:white;
color:black;
padding:20px;
border-radius:12px;
margin-top:20px;
}

textarea{
width:100%;
height:140px;
padding:15px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#02110d;
color:white;
cursor:pointer;
font-size:15px;
}

.result{
display:none;
margin-top:20px;
}

iframe{
width:100%;
border-radius:10px;
border:none;
}

@media(max-width:800px){

.app{
flex-direction:column;
}

.sidebar{
width:100%;
}

}

</style>

</head>

<body>

<div class="topbar">
<div>Tarvex AI Builder</div>
<a href="dashboard.html">Dashboard</a>
</div>

<div class="app">

<div class="sidebar">

<div class="logo">Tarvex</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="builder.html">AI Builder</a>
<a href="domains.html">Domains</a>
<a href="deploy.html">Deploy</a>
<a href="ai.html">AI Assistant</a>
</div>

</div>

<div class="main">

<h2>Build Website With AI</h2>
<p>Describe your website and Tarvex will generate it</p>

<div class="card">

<textarea id="prompt" placeholder="example: restaurant website with booking and menu"></textarea>

<button onclick="generate()">Generate Website</button>

</div>

<div class="card result" id="result"></div>

</div>

</div>

<script src="builder.js"></script>

</body>
  </html>

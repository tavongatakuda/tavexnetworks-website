<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarvex AI Builder</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#062b22,#031914);
color:white;
overflow-x:hidden;
}

.nav{
display:flex;
justify-content:space-between;
padding:20px;
}

.back{
background:white;
color:black;
padding:8px 14px;
border-radius:20px;
text-decoration:none;
}

.container{
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:16px;
margin-top:20px;
}

textarea{
width:100%;
height:140px;
padding:15px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:12px;
background:black;
color:white;
font-size:16px;
cursor:pointer;
}

.result{
display:none;
margin-top:20px;
}

.preview{
background:#f3f3f3;
padding:15px;
border-radius:12px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="nav">
<div>AI Builder</div>
<a class="back" href="dashboard.html">Dashboard</a>
</div>

<div class="container">

<h2>Describe your website</h2>
<p>Tarvex AI will generate it</p>

<div class="card">

<textarea id="prompt" placeholder="example: business website with home, about, services and contact"></textarea>

<button onclick="generate()">Generate Website</button>

</div>

<div class="card result" id="result">

<h3>Website Structure</h3>

<div class="preview">
Home Page<br>
About Page<br>
Services Page<br>
Contact Page
</div>

<button onclick="deploy()">Deploy Website</button>

</div>

</div>

<script>

function generate(){

let text=document.getElementById("prompt").value

if(text==""){
alert("Describe website first")
return
}

document.getElementById("result").style.display="block"

}

function deploy(){
window.location.href="deploy.html"
}

</script>

</body>
</html>

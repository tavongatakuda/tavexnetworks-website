<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarvex AI Builder</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:
radial-gradient(circle at 20% 20%, #00ffae22 0%, transparent 40%),
radial-gradient(circle at 80% 70%, #00ffae22 0%, transparent 40%),
linear-gradient(180deg,#031914,#02110d);
color:white;
min-height:100vh;
}

/* NAV */

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

.logo{
font-weight:bold;
font-size:20px;
}

/* HERO */

.hero{
padding:30px 20px;
}

.hero h1{
font-size:30px;
margin-bottom:10px;

background: linear-gradient(90deg,#00ffae,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
opacity:.7;
}

/* BOX */

.box{
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,255,174,0.2);
backdrop-filter:blur(20px);
padding:20px;
border-radius:20px;
margin-top:20px;
}

textarea{
width:100%;
height:120px;
background:transparent;
border:none;
color:white;
font-size:16px;
outline:none;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:15px;
}

.send{
background:linear-gradient(90deg,#00ffae,#00c896);
border:none;
width:55px;
height:55px;
border-radius:15px;
cursor:pointer;
}

.tags{
margin-top:15px;
}

.tag{
background:rgba(0,255,174,0.08);
border:1px solid rgba(0,255,174,0.2);
padding:8px 14px;
border-radius:20px;
display:inline-block;
margin:4px;
cursor:pointer;
}

.result{
padding:20px;
}

.preview{
background:white;
color:black;
padding:20px;
border-radius:12px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="nav">
<div class="logo">Tarvex</div>
</div>

<div class="hero">

<h1>Hi, What will you build next?</h1>
<p>Describe your app idea and Tarvex will generate it</p>

<div class="box">

<textarea id="prompt" placeholder="Describe the app you want to create..."></textarea>

<div class="row">
<div>Plan</div>
<button class="send" onclick="generate()">→</button>
</div>

<div class="tags">
<span class="tag" onclick="fill('CRM system for managing customers')">CRM</span>
<span class="tag" onclick="fill('Productivity app for tasks')">Productivity</span>
<span class="tag" onclick="fill('Entertainment streaming platform')">Entertainment</span>
<span class="tag" onclick="fill('Educational learning platform')">Educational</span>
<span class="tag" onclick="fill('Finance tracker app')">Finance</span>
</div>

</div>

</div>

<div id="result" class="result"></div>


<!-- LOGIN MODAL -->

<div id="loginModal" style="
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:999;
">

<div style="
background:white;
color:black;
padding:25px;
border-radius:16px;
width:90%;
max-width:350px;
">

<h2>Welcome to Tarvex</h2>

<button style="
width:100%;
padding:12px;
background:#00ffae;
border:none;
border-radius:10px;
margin-top:10px;
">
Login with Google
</button>

<div style="text-align:center;margin:10px 0;">OR</div>

<input id="email" placeholder="Enter your email"
style="width:100%;padding:12px;border-radius:8px;border:1px solid #ddd">

<button onclick="continueLogin()"
style="
width:100%;
padding:12px;
margin-top:10px;
background:#00ffae;
border:none;
border-radius:10px;
">
Continue
</button>

<p style="text-align:center;margin-top:10px">
Don't have account? <a href="signup.html">Sign up</a>
</p>

</div>
</div>


<script>

function build(text){

let brand=text.split(" ")[0]
brand=brand.charAt(0).toUpperCase()+brand.slice(1)

let site=`

<div style="font-family:Arial">

<div style="
background:#031914;
color:white;
padding:15px;
display:flex;
justify-content:space-between">

<div>${brand}</div>
<div>Home | About | Services | Contact</div>

</div>

<div style="padding:40px;text-align:center">

<h1>${text}</h1>
<p>Powered by Tarvex AI builder</p>

<button style="
padding:12px 20px;
background:#00ffae;
border:none;
border-radius:8px">
Get Started
</button>

</div>

<div style="padding:30px">
<h2>About</h2>
<p>${brand} is a modern platform created with Tarvex AI.</p>
</div>

<div style="padding:30px">
<h2>Services</h2>
<ul>
<li>Website design</li>
<li>AI tools</li>
<li>Hosting</li>
<li>Domains</li>
</ul>
</div>

<div style="
background:#031914;
color:white;
padding:20px;
text-align:center">

${brand} © Tarvex

</div>

</div>
`

document.getElementById("result").innerHTML=`

<h3>Website Preview</h3>

<div class="preview">
${site}
</div>

`

}

</script>
</body>
  </html>

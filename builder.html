<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarvex Builder</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#062b22,#031914);
color:white;
overflow-x:hidden;
}

/* NAV */

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(255,255,255,0.05);
}

.nav a{
color:white;
text-decoration:none;
margin-left:10px;
}

/* CONTENT */

.container{
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:16px;
margin-top:15px;
}

textarea{
width:100%;
height:120px;
padding:15px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:black;
color:white;
font-size:16px;
cursor:pointer;
}

.result{
display:none;
margin-top:15px;
}

</style>

</head>

<body>

<div class="nav">
<div>Tarvex</div>

<div>
<a href="dashboard.html">Dashboard</a>
<a href="builder.html">Builder</a>
<a href="domains.html">Domains</a>
<a href="ai.html">AI</a>
</div>
</div>

<div class="container">

<h2>Build with AI</h2>

<div class="card">

<textarea id="prompt" placeholder="example: restaurant website with menu"></textarea>

<button onclick="generate()">Start Building</button>

</div>

<div class="card result" id="result">

<h3>Website generated</h3>
<p>Your AI website is ready</p>

<button onclick="deploy()">Deploy</button>

</div>

</div>

<script>

function generate(){

let text=document.getElementById("prompt").value

if(text==""){
alert("Describe website first")
return
}

document.getElementById("result").style.display="block"

}

function deploy(){
window.location.href="deploy.html"
}

</script>

</body>
</html>

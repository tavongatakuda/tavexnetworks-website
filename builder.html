<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarvex Workspace</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background: radial-gradient(circle at center,#0a3d2f 0%, #031914 60%);
color:white;
overflow-x:hidden;
font-size:14px;
}

/* LAYOUT */

.app{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#02110d;
border-right:1px solid rgba(255,255,255,0.05);
padding:15px;
overflow:auto;
}

.logo{
font-weight:700;
font-size:18px;
display:flex;
gap:8px;
align-items:center;
margin-bottom:15px;
}

.logo::before{
content:"⚡";
}

.new{
background:linear-gradient(90deg,#00ffae,#00c896);
color:black;
padding:10px;
border:none;
width:100%;
border-radius:10px;
cursor:pointer;
margin-bottom:15px;
font-size:14px;
}

.project{
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:10px;
margin-bottom:8px;
cursor:pointer;
}

.project:hover{
background:rgba(0,255,174,0.1);
}

.pname{
color:#00ffae;
font-size:14px;
}

.pprompt{
opacity:.5;
font-size:12px;
}

/* MAIN */

.main{
flex:1;
overflow:auto;
}

/* HERO */

.hero{
text-align:center;
padding:40px 20px;
animation:fadeIn 1s ease;
}

.hero h2{
font-size:22px;
margin-bottom:8px;
background: linear-gradient(90deg, #00ffae, #ffffff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

#projectTitle{
opacity:.7;
margin-top:5px;
}

/* BOX */

.box{
max-width:600px;
margin:auto;
margin-top:20px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,255,174,0.2);
padding:20px;
border-radius:16px;
}

/* TEXTAREA */

textarea{
width:100%;
height:110px;
padding:12px;
border-radius:14px;
border:1px solid rgba(0,255,174,0.2);
font-size:14px;
background:rgba(255,255,255,0.05);
color:white;
outline:none;
}

/* BUTTON */

.send{
background:linear-gradient(90deg,#00ffae,#00c896);
border:none;
width:45px;
height:45px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

/* PREVIEW */

.preview{
background:white;
color:black;
padding:20px;
border-radius:12px;
margin-top:20px;
max-width:900px;
margin-left:auto;
margin-right:auto;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

/* MOBILE */

@media(max-width:800px){

.app{
flex-direction:column;
}

.sidebar{
width:100%;
border-right:none;
border-bottom:1px solid rgba(255,255,255,0.05);
}

}

/* FADE */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">Tarvex</div>

<button class="new" onclick="newProject()">
+ New Project
</button>

<div id="projectList"></div>

</div>

<!-- MAIN -->
<div class="main">

<div class="hero">

<h2>What will you build?</h2>
<h3 id="projectTitle">New Project</h3>

<div class="box">

<textarea id="prompt"></textarea>

<br><br>

<button class="send" onclick="generate()">→</button>

</div>

</div>

<div id="result" class="result"></div>

</div>

</div>

<script>

let projects = JSON.parse(localStorage.getItem("projects")) || []

renderProjects()

function renderProjects(){

let html=""

projects.slice().reverse().forEach((p,i)=>{

let index = projects.length-1-i

html += `
<div class="project">

<div onclick="openProject(${index})">
<div class="pname">${p.name}</div>
<div class="pprompt">${p.prompt}</div>
</div>

<div onclick="deleteProject(${index})"
style="margin-top:6px;font-size:11px;opacity:.5;">
Delete
</div>

</div>
`

})

document.getElementById("projectList").innerHTML = html

}

function newProject(){
document.getElementById("prompt").value=""
document.getElementById("projectTitle").innerText="New Project"
document.getElementById("result").innerHTML=""
}

function openProject(index){

let p = projects[index]

document.getElementById("prompt").value = p.prompt
document.getElementById("projectTitle").innerText = p.name

build(p.prompt)

}

function deleteProject(index){

projects.splice(index,1)

localStorage.setItem(
"projects",
JSON.stringify(projects)
)

renderProjects()

document.getElementById("result").innerHTML=""
document.getElementById("projectTitle").innerText="New Project"

}

function generate(){

let text = document.getElementById("prompt").value

if(!text) return

let user = localStorage.getItem("user")

if(!user){
alert("Login first")
window.location.href="login.html"
return
}

build(text)

}

function build(text){

let brand = text.split(" ")[0]

document.getElementById("projectTitle").innerText = brand

projects.push({
name:brand,
prompt:text,
date:new Date().toLocaleString()
})

localStorage.setItem("projects",JSON.stringify(projects))

renderProjects()

let site = `
<h2>${text}</h2>
<p>Website generated by Tarvex AI</p>
`

document.getElementById("result").innerHTML = `
<div class="preview">${site}</div>
`

}

</script>

</body>
</html>

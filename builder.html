<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarvex Workspace</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#031914;
color:white;
min-height:100vh;
}

/* LAYOUT */

.app{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#02110d;
border-right:1px solid rgba(255,255,255,0.05);
padding:15px;
overflow:auto;
}

.logo{
font-weight:bold;
font-size:18px;
margin-bottom:15px;
}

.new{
background:#00ffae;
color:black;
padding:10px;
border:none;
width:100%;
border-radius:8px;
cursor:pointer;
margin-bottom:15px;
}

.project{
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:5px;
background:rgba(255,255,255,0.03);
}

.project:hover{
background:rgba(0,255,174,0.1);
}

.pname{
color:#00ffae;
font-size:14px;
}

.pprompt{
opacity:.5;
font-size:12px;
}

/* MAIN */

.main{
flex:1;
overflow:auto;
}

/* BUILDER */

.hero{
padding:30px;
}

.box{
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,255,174,0.2);
padding:20px;
border-radius:16px;
margin-top:15px;
}

textarea{
width:100%;
height:120px;
background:transparent;
border:none;
color:white;
outline:none;
}

.send{
background:#00ffae;
border:none;
width:50px;
height:50px;
border-radius:10px;
cursor:pointer;
}

.result{
padding:20px;
}

.preview{
background:white;
color:black;
padding:20px;
border-radius:12px;
}

/* MOBILE FIX */

@media(max-width:900px){

.app{
flex-direction:column;
}

.sidebar{
width:100%;
border-right:none;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.main{
width:100%;
}

.hero{
padding:20px;
}

}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">Tarvex</div>

<button class="new" onclick="newProject()">
+ New Project
</button>

<div id="projectList"></div>

</div>

<!-- MAIN -->

<div class="main">

<div class="hero">

<h2>What will you build?</h2>

<div class="box">

<textarea id="prompt"></textarea>

<br><br>

<button class="send" onclick="generate()">
→
</button>

</div>

</div>

<div id="result" class="result"></div>

</div>

</div>

<script>

let projects = JSON.parse(localStorage.getItem("projects")) || []

renderProjects()

function renderProjects(){

let html=""

projects.slice().reverse().forEach((p,i)=>{

let index = projects.length-1-i

html += `
<div class="project" onclick="openProject(${index})">
<div class="pname">${p.name}</div>
<div class="pprompt">${p.prompt}</div>
</div>
`

})

document.getElementById("projectList").innerHTML = html

}

function newProject(){
document.getElementById("prompt").value=""
}

function openProject(index){

let p = projects[index]

document.getElementById("prompt").value = p.prompt

build(p.prompt)

}

function generate(){

let text = document.getElementById("prompt").value

if(!text) return

let user = localStorage.getItem("user")

if(!user){
alert("Login first")
window.location.href="login.html"
return
}

build(text)

}

function build(text){

let brand=text.split(" ")[0]

let projects = JSON.parse(localStorage.getItem("projects")) || []

projects.push({
name:brand,
prompt:text,
date:new Date().toLocaleString()
})

localStorage.setItem("projects",JSON.stringify(projects))

renderProjects()

let site = `
<h2>${text}</h2>
<p>Website generated by Tarvex</p>
`

document.getElementById("result").innerHTML = `
<div class="preview">${site}</div>
`

}

</script>

</body>
</html>

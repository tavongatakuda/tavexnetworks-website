<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarvex AI Builder</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:
radial-gradient(circle at 20% 20%, #00ffae22 0%, transparent 40%),
radial-gradient(circle at 80% 70%, #00ffae22 0%, transparent 40%),
linear-gradient(180deg,#031914,#02110d);
color:white;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 20px;
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.03);
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
font-weight:bold;
font-size:20px;
}

.menu{
font-size:22px;
cursor:pointer;
}

/* HERO */

.hero{
padding:30px 20px;
}

.hero h1{
font-size:30px;
margin-bottom:10px;
background:linear-gradient(90deg,#00ffae,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
opacity:.7;
}

/* GLASS BOX */

.prompt-box{
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,255,174,0.2);
backdrop-filter:blur(20px);
border-radius:20px;
padding:20px;
margin-top:20px;
}

/* TEXTAREA */

textarea{
width:100%;
height:120px;
background:transparent;
border:none;
color:white;
font-size:16px;
outline:none;
}

textarea::placeholder{
color:rgba(255,255,255,0.4);
}

/* ACTION ROW */

.actions{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:15px;
}

/* BUTTON */

.generate{
background:linear-gradient(90deg,#00ffae,#00c896);
color:black;
border:none;
width:50px;
height:50px;
border-radius:15px;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px rgba(0,255,174,0.4);
}

/* TAGS */

.tags{
margin-top:15px;
}

.tag{
background:rgba(0,255,174,0.08);
border:1px solid rgba(0,255,174,0.2);
padding:8px 14px;
border-radius:20px;
display:inline-block;
margin:4px;
font-size:13px;
cursor:pointer;
transition:.2s;
}

.tag:hover{
background:rgba(0,255,174,0.2);
}

/* RESULT */

.result{
padding:20px;
}

.preview{
background:white;
color:black;
padding:20px;
border-radius:12px;
margin-top:10px;
}

</style></head><body><div class="header">
<div class="logo">Tarvex</div>
<div class="menu">☰</div>
</div><div class="hero"><h1>Hi, What will you build next?</h1>
<p>Describe your app idea and Tarvex will generate it</p><div class="prompt-box"><textarea id="prompt" placeholder="Describe the app you want to create..."></textarea><div class="actions">
<div>Plan</div>
<button class="generate" onclick="generate()">→</button>
</div><div class="tags">
<div class="tag" onclick="fill('CRM system for managing customers')">CRM</div>
<div class="tag" onclick="fill('Productivity app for task management')">Productivity</div>
<div class="tag" onclick="fill('Entertainment platform for streaming content')">Entertainment</div>
<div class="tag" onclick="fill('Educational platform for online learning')">Educational</div>
<div class="tag" onclick="fill('Finance tracker for budgeting and expenses')">Finance</div>
</div></div></div><div id="result" class="result"></div><script>

function fill(text){
document.getElementById("prompt").value = text
document.getElementById("prompt").focus()
}

function generate(){

let text=document.getElementById("prompt").value

if(text==""){
alert("Describe your idea")
return
}

let brand=text.split(" ")[0]
brand=brand.charAt(0).toUpperCase()+brand.slice(1)

let site=`

<div style="font-family:Arial">

<div style="
background:#0b2a5b;
color:white;
padding:15px;
display:flex;
justify-content:space-between">

<div>${brand}</div>

<div>
Home | About | Services | Contact
</div>

</div>

<div style="padding:40px;text-align:center">

<h1>${brand}</h1>
<p>${text}</p>

<button style="
padding:10px 20px;
background:black;
color:white;
border:none;
border-radius:6px">
Get Started
</button>

</div>

<div style="padding:30px">
<h2>About</h2>
<p>Welcome to ${brand}. We provide services powered by Tarvex AI.</p>
</div>

<div style="padding:30px">
<h2>Services</h2>
<ul>
<li>Website Design</li>
<li>Hosting</li>
<li>Domains</li>
<li>AI Tools</li>
</ul>
</div>

<div style="
background:#0b2a5b;
color:white;
padding:20px;
text-align:center">

${brand} © Tarvex AI

</div>

</div>
`

document.getElementById("result").innerHTML=`

<h3>Website Preview</h3>

<div class="preview">
${site}
</div>

`

}

</script></body>
  </html>

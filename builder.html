<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Builder - Tarvex</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#031914;
color:white;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
padding:15px 20px;
background:#02110d;
}

/* LAYOUT */

.app{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#02110d;
padding:20px;
}

.logo{
font-size:20px;
margin-bottom:30px;
}

.menu a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin-bottom:5px;
border-radius:8px;
}

.menu a:hover{
background:#062b22;
}

/* MAIN */

.main{
flex:1;
padding:20px;
}

/* CARD */

.card{
background:white;
color:black;
padding:20px;
border-radius:12px;
margin-top:20px;
}

textarea{
width:100%;
height:140px;
padding:15px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:black;
color:white;
cursor:pointer;
}

.result{
display:none;
margin-top:20px;
}

@media(max-width:800px){

.app{
flex-direction:column;
}

.sidebar{
width:100%;
}

}

</style>

</head>

<body>

<div class="topbar">
<div>AI Builder</div>
<a href="dashboard.html">Dashboard</a>
</div>

<div class="app">

<div class="sidebar">

<div class="logo">Tarvex</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="builder.html">AI Builder</a>
<a href="domains.html">Domains</a>
<a href="deploy.html">Deploy</a>
<a href="ai.html">AI Assistant</a>
</div>

</div>

<div class="main">

<h2>AI Website Builder</h2>
<p>Describe your website idea</p>

<div class="card">

<textarea id="prompt" placeholder="example: restaurant website with booking and menu"></textarea>

<button onclick="generate()">Generate Website</button>

</div>

<div class="card result" id="result"></div>

</div>

</div>

<script>

const TARVEX_EMAIL = "tarvexnetworks@gmail.com";

function generate(){

let text = document.getElementById("prompt").value.toLowerCase()

if(text==""){
alert("Describe website first")
return
}

document.getElementById("result").style.display="block"
document.getElementById("result").innerHTML="Generating..."

let layout=""

if(text.includes("restaurant")){

layout = `
<h2>Restaurant</h2>
<p>Welcome to our restaurant</p>

<h3>Menu</h3>
<ul>
<li>Burger</li>
<li>Pizza</li>
<li>Drinks</li>
</ul>
`

}

else if(text.includes("portfolio")){

layout = `
<h2>Portfolio</h2>
<p>My Projects</p>

<div style='display:flex;gap:10px'>
<div style='background:#eee;padding:20px'>Project 1</div>
<div style='background:#eee;padding:20px'>Project 2</div>
</div>
`

}

else if(text.includes("shop")){

layout = `
<h2>Shop</h2>

<div style='display:flex;gap:10px'>
<div style='border:1px solid #ddd;padding:10px'>
Product 1<br><button>Buy</button>
</div>

<div style='border:1px solid #ddd;padding:10px'>
Product 2<br><button>Buy</button>
</div>
</div>
`

}

else{

layout = `
<h2>Business Website</h2>
<p>Welcome to our company</p>
<button>Contact</button>
`

}

setTimeout(()=>{

document.getElementById("result").innerHTML = `

<h3>Website Preview</h3>

<iframe style="
width:100%;
height:500px;
border:none;
border-radius:10px;
background:white;
"
srcdoc="

<html>
<body style='font-family:Arial;margin:0'>

<div style='background:#0b2a5b;color:white;padding:15px'>
<b>${text.toUpperCase()}</b>
<span style='float:right'>
Home | Services | About | Contact
</span>
</div>

<div style='padding:20px'>

${layout}

<hr>

<h3>Contact</h3>
<p>Email: ${TARVEX_EMAIL}</p>

</div>

</body>
</html>

"></iframe>

<button onclick='deploy()' style='margin-top:15px'>
Deploy Website
</button>

`

},800)

}

function deploy(){
window.location.href="deploy.html"
}

</script>

</body>
  </html>

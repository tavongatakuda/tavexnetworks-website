<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Builder - Tarvex</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#031914;
color:white;
}

/* LAYOUT */

.app{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#02110d;
padding:20px;
}

.logo{
font-size:20px;
margin-bottom:30px;
}

.menu a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin-bottom:5px;
border-radius:8px;
}

.menu a:hover{
background:#062b22;
}

/* MAIN */

.main{
flex:1;
padding:20px;
}

/* CARD */

.card{
background:white;
color:black;
padding:20px;
border-radius:12px;
margin-top:20px;
}

textarea{
width:100%;
height:140px;
padding:15px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:black;
color:white;
cursor:pointer;
}

.result{
display:none;
margin-top:20px;
}

@media(max-width:800px){
.sidebar{
display:none;
}
}

</style>

</head>

<body>

<div class="app">

<div class="sidebar">

<div class="logo">Tarvex</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="builder.html">AI Builder</a>
<a href="domains.html">Domains</a>
<a href="deploy.html">Deploy</a>
<a href="ai.html">AI Assistant</a>
</div>

</div>

<div class="main">

<h2>AI Website Builder</h2>
<p>Describe your website idea</p>

<div class="card">

<textarea id="prompt" placeholder="example: restaurant website with booking and menu"></textarea>

<button onclick="generate()">Generate Website</button>

</div>

<div class="card result" id="result">

<h3>Website Generated</h3>
<p>Your AI website structure is ready</p>

<button onclick="deploy()">Deploy</button>

</div>

</div>

</div>

<script>

function generate(){

let text=document.getElementById("prompt").value

if(text==""){
alert("Describe website first")
return
}

document.getElementById("result").style.display="block"

}

function deploy(){
window.location.href="deploy.html"
}

</script>

</body>
</html>

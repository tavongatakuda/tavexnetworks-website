<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarvex AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#031914;
color:white;
}

/* LAYOUT */

.app{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#02110d;
padding:20px;
}

.logo{
font-size:20px;
margin-bottom:30px;
}

.menu a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin-bottom:5px;
border-radius:8px;
}

.menu a:hover{
background:#062b22;
}

/* MAIN */

.main{
flex:1;
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:12px;
margin-top:20px;
}

.chat{
height:250px;
overflow:auto;
background:#f3f3f3;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.msg{
margin-bottom:8px;
}

.user{
font-weight:bold;
}

.ai{
color:#2563eb;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:black;
color:white;
cursor:pointer;
}

@media(max-width:800px){
.sidebar{
display:none;
}
}

</style>

</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">Tarvex</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="builder.html">AI Builder</a>
<a href="domains.html">Domains</a>
<a href="deploy.html">Deploy</a>
<a href="ai.html">AI Assistant</a>
</div>

</div>

<div class="main">

<h2>Tarvex AI Assistant</h2>
<p>Ask anything about your website</p>

<div class="card">

<div class="chat" id="chat"></div>

<input id="message" placeholder="Ask Tarvex AI...">

<button onclick="send()">Send</button>

</div>

</div>

</div>

<script>

function send(){

let msg=document.getElementById("message").value

if(msg=="") return

let chat=document.getElementById("chat")

chat.innerHTML += "<div class='msg user'>You: "+msg+"</div>"

chat.innerHTML += "<div class='msg ai'>Tarvex AI: I will help you with that.</div>"

document.getElementById("message").value=""

chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>

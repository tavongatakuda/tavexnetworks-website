<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarvex AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#062b22,#031914);
color:white;
overflow-x:hidden;
}

.nav{
display:flex;
justify-content:space-between;
padding:20px;
}

.back{
background:white;
color:black;
padding:8px 14px;
border-radius:20px;
text-decoration:none;
}

.container{
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:16px;
margin-top:20px;
}

.chat{
height:250px;
overflow:auto;
background:#f3f3f3;
padding:10px;
border-radius:12px;
margin-bottom:10px;
}

.msg{
margin-bottom:8px;
}

.user{
font-weight:bold;
}

.ai{
color:#2563eb;
}

input{
width:100%;
padding:15px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:12px;
background:black;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="nav">
<div>Tarvex AI</div>
<a class="back" href="dashboard.html">Dashboard</a>
</div>

<div class="container">

<h2>Tarvex AI Assistant</h2>
<p>Ask anything about your website</p>

<div class="card">

<div class="chat" id="chat"></div>

<input id="message" placeholder="Ask Tarvex AI...">

<button onclick="send()">Send</button>

</div>

</div>

<script>

function send(){

let msg=document.getElementById("message").value

if(msg=="") return

let chat=document.getElementById("chat")

chat.innerHTML += "<div class='msg user'>You: "+msg+"</div>"

chat.innerHTML += "<div class='msg ai'>Tarvex AI: I will help you build that.</div>"

document.getElementById("message").value=""

chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>
